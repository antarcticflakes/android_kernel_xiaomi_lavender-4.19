name: Build ARM64 Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt install -y \
          git \
          device-tree-compiler \
          lz4 \
          xz-utils \
          zlib1g-dev \
          gcc \
          g++ \
          python3 \
          python-is-python3 \
          p7zip-full \
          android-sdk-libsparse-utils \
          erofs-utils \
          default-jdk \
          git \
          gnupg \
          flex \
          bison \
          gperf \
          build-essential \
          zip \
          curl \
          libc6-dev \
          libncurses-dev \
          libx11-dev \
          libreadline-dev \
          libgl1 \
          libgl1-mesa-dev \
          python3 \
          make \
          bc \
          grep \
          tofrodos \
          python3-markdown \
          libxml2-utils \
          xsltproc \
          zlib1g-dev \
          python-is-python3 \
          libc6-dev \
          libtinfo6 \
          make \
          cpio \
          kmod \
          openssl \
          libelf-dev \
          pahole \
          libssl-dev \
          libarchive-tools \
          zstd \
          rsync \
          xz-utils

      - name: Download and extract toolchain
        run: |
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-14.0.0_r18/clang-r487747c.tar.gz
          mkdir toolchain
          cd toolchain
          tar xvf ../clang-r487747c.tar.gz
          echo "$HOME/toolchain/bin" >> $GITHUB_PATH

      - name: Set environment variables
        run: |
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
          echo "LLVM=1" >> $GITHUB_ENV
          echo "LLVM_IAS=1" >> $GITHUB_ENV
          echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-android-" >> $GITHUB_ENV

      - name: Configure kernel
        run: |
          make mrproper
          make clean
          make lavender_defconfig
          make prepare O=out
          cd out
          make lavender_defconfig

      - name: Build kernel
        run: |
          cd out
          make -j$(nproc)

      - name: Upload boot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-boot
          path: out/arch/arm64/boot
          if-no-files-found: error
