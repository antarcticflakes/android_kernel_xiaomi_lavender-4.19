name: Build ARM64 Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt install -y \
          git \
          device-tree-compiler \
          lz4 \
          xz-utils \
          zlib1g-dev \
          gcc \
          g++ \
          python3 \
          python-is-python3 \
          p7zip-full \
          android-sdk-libsparse-utils \
          erofs-utils \
          default-jdk \
          git \
          gnupg \
          flex \
          bison \
          gperf \
          build-essential \
          zip \
          curl \
          libc6-dev \
          libncurses-dev \
          libx11-dev \
          libreadline-dev \
          libgl1 \
          libgl1-mesa-dev \
          python3 \
          make \
          bc \
          grep \
          tofrodos \
          python3-markdown \
          libxml2-utils \
          xsltproc \
          zlib1g-dev \
          python-is-python3 \
          libc6-dev \
          libtinfo6 \
          make \
          cpio \
          kmod \
          openssl \
          libelf-dev \
          pahole \
          libssl-dev \
          libarchive-tools \
          zstd \
          rsync \
          xz-utils

      - name: Start build
        run: |
          bash .github/workflows/build.sh

      - name: Upload boot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-boot
          path: out/arch/arm64/boot
          if-no-files-found: error
